<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ceramic Tile Defect Detection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-control {
            margin-bottom: 20px;
        }

        .btn-primary {
            width: 100%;
            background-color: #0052cc;
            border: none;
            padding: 10px;
            font-size: 16px;
        }

        .btn-primary:hover {
            background-color: #003d99;
        }

        .preview-img {
            margin-top: 20px;
            width: 100%;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .preview-img img {
            max-width: 100%;
            border-radius: 10px;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #999;
        }

        .button-link {
        display: inline-block;
        padding: 10px 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        text-decoration: none;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }

    .button-link:hover {
        background-color: #0056b3;
    }
    </style>
</head>
<body>
    <div class="container">
        <h2>🧪 Ceramic Tile Defect Detection</h2>
        <form method="POST" enctype="multipart/form-data">
            <input class="form-control" type="file" name="image" required>
            <button class="btn btn-primary" type="submit">Run Inference</button>
        </form>
        {% if output_image %}
            <h2>Output Image:</h2>
            <img src="{{ url_for('static', filename='outputs/' + output_image) }}" style="max-width:500px;">
        {% endif %}

        {% if report_file %}
            <br><br>
            <a href="{{ url_for('static', filename='reports/' + report_file) }}" download class="button-link">📄 Download Report</a>
        {% endif %}


    </div>
    <footer>
        Made with ❤️ for AI Project
    </footer>
</body>
</html>
